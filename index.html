<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-image: linear-gradient(to right bottom, rgba(147, 147, 255, 0.534), white, rgba(147, 147, 255, 0.534));
            background-repeat: no-repeat;
            height: 100%;
        }
        h1 {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 40px;
            color: darkblue;
        }
        table {
            margin: auto;
            width: 35%;
            border: 2px solid darkblue;
        }
        td {
            text-align: center;
            border: 2px solid darkblue;
        }
        a {
            text-decoration: none;
            color: darkblue;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-weight: bolder;
            padding: 15px;
            background-color: rgb(193, 255, 255);
            border: 2px solid darkblue;
            border-radius: 10px;
            transition: 150ms;
        }
        a:hover {
            background-color: rgb(147, 147, 255);
            color: white;
            border: 2px solid darkblue;
            border-radius: 10px;
        }
        a:active {
            background-color: rgb(79, 79, 151);
            color: white;
            border: 2px solid darkblue;
            border-radius: 10px;
        }
        @media screen and (max-width: 515px) {
            body {
                scale: 0.75;
            }
            h1 {
                font-size: 30px;
            }
            table {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to my Website</h1>
    <table border="1" cellpadding="25">
        <tr><td><a href="sessions/session_01.html">Session 01</a></td></tr>
        <tr><td><a href="sessions/session_02.html">Session 02</a></td></tr>
    </table>
</body>
</html>
