<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise_03</title>
    <style>
        button {
            text-decoration: none;
            color: darkblue;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-weight: bolder;
            padding: 15px;
            background-color: rgb(193, 255, 255);
            border: 2px solid darkblue;
            border-radius: 10px;
            cursor: pointer;
            transition: 150ms;
        }
        button:hover {
            background-color: rgb(147, 147, 255);
            color: white;
            border: 2px solid darkblue;
            border-radius: 10px;
        }
        button:active {
            background-color: rgb(79, 79, 151);
            color: white;
            border: 2px solid darkblue;
            border-radius: 10px;
        }
    </style>
    <link rel="stylesheet" href="./CSS/style.css">
    <title>Session_03</title>
</head>
